# sprint-arm-ux — Sprint Arm: UX child workflow (v0)
# owner: ux (Signe), reviewer (Astrid)
# last-updated: 2026-07-16
# status: v0 — registered-def fixture placeholder
#
# Registered-def copy for CI conformance validation (INF-42 / INF-45).
# Canonical source: dev-sprint-workflow-spec.md arm archetype table.
# Keep in sync when a full YAML is authored in the vault.
#
# INF-45 (2026-07-16): added to registered-defs as child_workflow target
# for dev-sprint's spawn-arms fanout.
#
# Archetype: linear — intake → analysis → review → done.
# Content: IA, mental model, user flows (entry/success/error/empty/exit),
# UX-blockers vs UI-prompts.

id: sprint-arm-ux
version: 0
archetype: linear
entry_state: intake

break_glass:
  command: escape
  to: escape
  owner_role: steward

states:

  - id: intake
    owner_role: steward
    kind: normal
    native_state: todo
    description: >
      Receive arm brief from dev-sprint.
    transitions:
      - command: begin
        to: analysis
        generic: continue

  - id: analysis
    owner_role: implementer
    kind: normal
    native_state: doing
    description: >
      IA, mental model, user flows, UX-blockers vs UI-prompts.
    transitions:
      - command: submit
        to: review
        generic: continue

  - id: review
    owner_role: reviewer
    kind: normal
    native_state: thinking
    transitions:
      - command: approve
        to: done
        generic: continue
      - command: request-changes
        to: analysis
        generic: revision

  - id: done
    kind: terminal
    native_state: done
    satisfies_parent_barrier: true

  - id: escape
    kind: terminal
    native_state: invalid
